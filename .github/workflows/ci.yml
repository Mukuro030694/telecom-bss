name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  ci:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://app:secret@127.0.0.1:5432/telecom_bss?serverVersion=15&charset=utf8

    strategy:
      matrix:
        php-version: [ '8.2' ]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: telecom_bss
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo, pdo_pgsql, intl, uuid
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Check code style
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Run PHPStan
        run: php vendor/phpstan/phpstan/phpstan analyse src --level=6 --memory-limit=512M

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Load fixtures
        run: php bin/console doctrine:fixtures:load --no-interaction --env=test

      - name: Run tests
        run: php bin/phpunit

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: ci  # ← запускается только после успешного CI
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            --fail \
            --write-out "\nHTTP Status: %{http_code}\n"

      - name: Wait for deploy to complete
        run: |
          echo "Deploy triggered. Check status at https://dashboard.render.com"
          echo "Waiting 30 seconds for deploy to start..."
          sleep 30

      - name: Smoke test
        run: |
          echo "Running smoke test..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://telecom-bss-1.onrender.com/customers)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed — got HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed!"